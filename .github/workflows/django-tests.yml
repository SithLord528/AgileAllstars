name: Django Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: AgileAllstars1
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (both databases)
        working-directory: AgileAllstars1
        run: |
          python manage.py migrate --database=default --settings=AgileAllstars.test_settings
          python manage.py migrate --database=projects --settings=AgileAllstars.test_settings

      - name: Run test suite
        working-directory: AgileAllstars1
        run: |
          python manage.py test tests --settings=AgileAllstars.test_settings --verbosity=2 --parallel
